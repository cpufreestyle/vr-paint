<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VR Paint - Launch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 480px;
    }
    .logo {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(102,126,234,0.4);
    }
    h1 {
      font-size: 2em;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 1em;
      margin-bottom: 36px;
    }
    .qr-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #qrcode { display: block; }
    .hint {
      color: rgba(255,255,255,0.5);
      font-size: 0.85em;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .hint strong { color: rgba(255,255,255,0.8); }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.05em;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(102,126,234,0.6);
    }
    .divider {
      color: rgba(255,255,255,0.3);
      margin: 20px 0;
      font-size: 0.85em;
    }
    .meta {
      color: rgba(255,255,255,0.35);
      font-size: 0.75em;
      margin-top: 24px;
    }
    .bg-orb {
      position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); opacity: 0.15;
    }
    .orb1 { width:400px; height:400px; background:#667eea; top:-100px; left:-100px; animation: float1 8s ease-in-out infinite; }
    .orb2 { width:300px; height:300px; background:#764ba2; bottom:-80px; right:-80px; animation: float2 10s ease-in-out infinite; }
    .orb3 { width:200px; height:200px; background:#f093fb; top:50%; left:60%; animation: float3 12s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,40px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-30px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,30px)} }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="container">
    <div class="logo">🎨</div>
    <h1>VR Paint</h1>
    <p class="subtitle">在虚拟现实中尽情创作 / Paint in VR</p>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>

    <p class="hint">
      用 <strong>Meta Quest</strong> 浏览器扫描二维码<br>
      或直接点击下方按钮进入
    </p>

    <a class="btn" href="./index.html">Enter VR Paint / 进入VR绘画</a>

    <div class="divider">— 或在 Quest 浏览器输入 —</div>
    <p style="color:rgba(255,255,255,0.7); font-size:0.9em; word-break:break-all;">vr-paint.vercel.app</p>

    <p class="meta">Powered by A-Frame · Michaelqiu</p>
    <a href="https://gitee.com/cpufreestyle/vr-paint" class="gitee-corner" aria-label="View source on Gitee" target="_blank"><svg width="70" height="70" viewBox="0 0 250 250" style="fill:#c71d23; color:#fff; position:absolute; top:0; border:0; right:0;"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path><text x="175" y="155" font-size="90" font-weight="bold" fill="#fff" font-family="Arial,sans-serif" text-anchor="middle" transform="rotate(-45 175 155)">G</text></svg></a><style>.gitee-corner:hover svg{opacity:0.8;transition:opacity .3s}.gitee-corner svg{transition:opacity .3s}</style>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://vr-paint.vercel.app',
      width: 220,
      height: 220,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
