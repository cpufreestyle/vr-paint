<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VR Paint - Launch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 480px;
    }
    .logo {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(102,126,234,0.4);
    }
    h1 {
      font-size: 2em;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 1em;
      margin-bottom: 36px;
    }
    .qr-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      display: inline-block;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #qrcode { display: block; }
    .hint {
      color: rgba(255,255,255,0.5);
      font-size: 0.85em;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .hint strong { color: rgba(255,255,255,0.8); }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.05em;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(102,126,234,0.6);
    }
    .divider {
      color: rgba(255,255,255,0.3);
      margin: 20px 0;
      font-size: 0.85em;
    }
    .meta {
      color: rgba(255,255,255,0.35);
      font-size: 0.75em;
      margin-top: 24px;
    }
    .bg-orb {
      position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); opacity: 0.15;
    }
    .orb1 { width:400px; height:400px; background:#667eea; top:-100px; left:-100px; animation: float1 8s ease-in-out infinite; }
    .orb2 { width:300px; height:300px; background:#764ba2; bottom:-80px; right:-80px; animation: float2 10s ease-in-out infinite; }
    .orb3 { width:200px; height:200px; background:#f093fb; top:50%; left:60%; animation: float3 12s ease-in-out infinite; }
    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,40px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-30px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,30px)} }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="container">
    <div class="logo">🎨</div>
    <h1>VR Paint</h1>
    <p class="subtitle">在虚拟现实中尽情创作 / Paint in VR</p>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>

    <p class="hint">
      用 <strong>Meta Quest</strong> 浏览器扫描二维码<br>
      或直接点击下方按钮进入
    </p>

    <a class="btn" href="./index.html">Enter VR Paint / 进入VR绘画</a>

    <div class="divider">— 或在 Quest 浏览器输入 —</div>
    <p style="color:rgba(255,255,255,0.7); font-size:0.9em; word-break:break-all;">vr-paint.vercel.app</p>

    <p class="meta">Powered by A-Frame · Michaelqiu</p>
    <a href="https://gitee.com/cpufreestyle/vr-paint" class="gitee-corner" aria-label="Gitee / View source" target="_blank"><svg width="70" height="70" viewBox="0 0 250 250" style="fill:#c71d23; color:#fff; position:absolute; top:0; border:0; right:0;"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path><path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px;" class="octo-arm"></path><path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path></svg></a><style>.gitee-corner:hover .octo-arm{animation:octocat-wave 560ms ease-in-out}@keyframes octocat-wave{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-25deg)}40%,80%{transform:rotate(10deg)}}@media(max-width:500px){.gitee-corner:hover .octo-arm{animation:none}.gitee-corner .octo-arm{animation:octocat-wave 560ms ease-in-out}}</style>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://vr-paint.vercel.app',
      width: 220,
      height: 220,
      colorDark: '#1a1a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
