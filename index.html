<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR绘画 - VR Paint</title>
    <link rel="icon" href="img/icon-256.png">
    <meta name="description" content="VR绘画 / Paint in VR. 基于A-Frame的虚拟现实绘画应用。Powered by A-Frame.">
    <meta name="keywords" content="VR, painting, WebXR, A-Frame, virtual reality, 虚拟现实, 绘画">
    <meta name="author" content="A-Frame Team, forked by vr-paint">
    <script src="vendor/aframe-master.min.js"></script>
    <script src="vendor/aframe-input-mapping-component.js"></script>
    <script src="build.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/clipboard@1.5.12/dist/clipboard.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-gltf-exporter-component@0.1.0/dist/aframe-gltf-exporter-component.min.js"></script>
    <script src="vendor/aframe-blink-controls.js"></script>
    <script src="vendor/aframe-tooltip-component.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-orbit-controls@1.3.0/dist/aframe-orbit-controls.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/png" href="favicon-32x32.png" sizes="32x32">
    <link rel="icon" type="image/png" href="favicon-16x16.png" sizes="16x16">
    <link rel="manifest" href="manifest.webmanifest">
  </head>
  <body>
    <a-scene vr-analytics renderer="colorManagement: true">
      <a-assets>
        <img id="skymap" src="assets/images/sky.jpg" crossorigin="anonymous">
        <img id="uinormal" src="assets/images/ui-normal.png" crossorigin="anonymous">
        <img id="floor" src="assets/images/floor.jpg" crossorigin="anonymous">
        <a-asset-item id="logoobj" src="assets/models/logo.obj"></a-asset-item>
        <a-asset-item id="logomtl" src="assets/models/logo.mtl"></a-asset-item>
        <a-asset-item id="uiobj" src="assets/models/ui.obj"></a-asset-item>
        <a-asset-item id="hitEntityObj" src="assets/models/TeleportHitEntity.obj"></a-asset-item>
        <a-asset-item id="tipObj" src="assets/models/controller-tip.glb"></a-asset-item>
        <audio id="ui_click0" src="https://cdn.aframe.io/a-painter/sounds/ui_click0.ogg"></audio>
        <audio id="ui_click1" src="https://cdn.aframe.io/a-painter/sounds/ui_click1.ogg"></audio>
        <audio id="ui_menu" src="https://cdn.aframe.io/a-painter/sounds/ui_menu.ogg"></audio>
        <audio id="ui_undo" src="https://cdn.aframe.io/a-painter/sounds/ui_undo.ogg"></audio>
        <audio id="ui_tick" src="https://cdn.aframe.io/a-painter/sounds/ui_tick.ogg"></audio>
        <audio id="ui_paint" src="https://cdn.aframe.io/a-painter/sounds/ui_paint.ogg"></audio>
      </a-assets>
      <a-light type="point" light="color: #fff; intensity:0.6" position="3 10 1"></a-light>
      <a-light type="point" light="color: #fff; intensity:0.2" position="-3 -10 0"></a-light>
      <a-light type="hemisphere" groundColor="#888" intensity="0.8"></a-light>
      <a-entity id="logo" logo-model
                animation="dur: 4000; property: logo-model.opacity; from: 1; to: 0; startEvents: painting-started"></a-entity>
      <a-entity id="ground"
                geometry="primitive: box; width: 12; height: 0.01; depth: 12"
                material="shader: flat; src: #floor">
      </a-entity>
      <a-entity id="sky" geometry="primitive:sphere; radius:30; phiLength:360; phiStart:0; thetaLength:90" material="shader:flat; side:back; height:2048; src:#skymap; width:2048"></a-entity>

      <a-entity id="hitEntityLeft" material="shader:flat; color: #ff3468" obj-model="obj: #hitEntityObj"></a-entity>
      <a-entity id="hitEntityRight" material="shader:flat; color: #ff3468" obj-model="obj: #hitEntityObj"></a-entity>
      <a-entity id="cameraRig">
        <!-- camera -->
        <a-entity id="acamera" camera></a-entity>
        <!-- hand controls -->
        <a-entity id="left-hand"
                  brush
                  paint-controls="hand: left"
                  blink-controls="cameraRig: #cameraRig; startEvents: aim; endEvents: teleport; hitCylinderColor: #ff3468; curveHitColor: #ff3468; curveMissColor: #333333; curveLineWidth: 0.01; hitEntity: #hitEntityLeft"
                  ui>
                    <a-entity class="vive-tooltips" visible="false">
                      <a-entity tooltip="text: 画笔大小 Brush size\n(上下滑动 slide up/down); width: 0.1; height: 0.04; targetPosition: 0 0.016 0.0073; src: assets/images/tooltip.png"
                                position="0.1 0.025 0.048"
                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: 主菜单 Main Menu; width: 0.07; height: 0.03; targetPosition: 0 -0.07 -0.062; lineHorizontalAlign: center; lineVerticalAlign: bottom; src: assets/images/tooltip.png"
                                position="0 0.015 -0.05"
                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: 按压绘画 Press to paint\n(压力感应 pressure sensitive); width: 0.11; height: 0.04; targetPosition: 0 -0.06 0.067; lineHorizontalAlign: right; src: assets/images/tooltip.png"
                                position="-0.11 -0.055 0.04"
                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: 撤销 Undo; width: 0.06; height: 0.03; targetPosition: -0.003 0.046 0.106; src: assets/images/tooltip.png"
                                position="0.1 -0.005 0.12"
                                rotation="-90 0 0">
                      </a-entity>
                    </a-entity>
                    <a-entity class="oculus-tooltips" visible="false">
                      <a-entity tooltip="text: 主菜单 Main Menu; width: 0.07; height: 0.03; targetPosition: 0.011 0.005 0.045; rotation: -90 0 0; src: assets/images/tooltip.png"
                              position="0.12 0.016 0.06">
                      </a-entity>
                      <a-entity tooltip="text: 传送 Teleport; width: 0.06; height: 0.03; targetPosition: 0.015 0 0.035; rotation: -90 0 0; src: assets/images/tooltip.png"
                          position="0.08 0.035 -0.02">
                      </a-entity>
                      <a-entity tooltip="text: 画笔大小 Brush size\n(上下滑动 slide up/down); width: 0.09; height: 0.04; targetPosition: 0 0.01 0.03; lineHorizontalAlign: center; lineVerticalAlign: top; rotation: -90 0 0; src: assets/images/tooltip.png"
                          position="-0.07 0.01 0.093">

                          position="-0.09 0.020 -0.067">
                      </a-entity>
                      <a-entity tooltip="text: 撤销 Undo; width: 0.05; height: 0.03; targetPosition: 0.01 -0.03 0.047; rotation: -90 0 0; src: assets/images/tooltip.png"
                          position="0.07 -0.01 0.088">
                      </a-entity>
                    </a-entity>
                    <a-entity class="windows-motion-samsung-tooltips" visible="false">
                      <a-entity tooltip="text: 触发绘画 Paint!; width: 0.1; height: 0.04; targetPosition: 0 -.3 -.1; lineHorizontalAlign: center; lineVerticalAlign: bottom; src: assets/images/tooltip.png"
                                position="0 -.1 -.2"
                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: 主菜单 Main Menu; width: 0.07; height: 0.03; targetPosition: 0.005 -0.002 -.06; lineHorizontalAlign: right; src: assets/images/tooltip.png"

                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: Press to 撤销 Undo; width: 0.11; height: 0.03; targetPosition: 0 0 0; lineHorizontalAlign: left; src: assets/images/tooltip.png"
                                position="0.11 0 0"
                                rotation="-90 0 0">
                      </a-entity>
                    </a-entity>
                    <a-entity class="windows-motion-tooltips" visible="false">
                      <a-entity tooltip="text: 触发绘画 Paint!; width: 0.1; height: 0.04; targetPosition: 0 -.3 -.1; lineHorizontalAlign: center; lineVerticalAlign: bottom; src: assets/images/tooltip.png"
                                position="0 -.1 -.2"
                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: 主菜单 Main Menu; width: 0.07; height: 0.03; targetPosition: 0.01 0.0025 -.06; lineHorizontalAlign: right; src: assets/images/tooltip.png"
                                position="-0.1 0.02 -.05"
                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: 画笔大小 Brush size\n(上下 up/down); width: 0.11; height: 0.04; targetPosition: 0 -.09 -.1; lineHorizontalAlign: left; src: assets/images/tooltip.png"
                                position="0.14 0 -.1"
                                rotation="-90 0 0">
                      </a-entity>
                      <a-entity tooltip="text: Press to 撤销 Undo; width: 0.11; height: 0.03; targetPosition: 0 0 0; lineHorizontalAlign: left; src: assets/images/tooltip.png"
                                position="0.11 0 0"
                                rotation="-90 0 0">
                      </a-entity>
                  </a-entity>
        </a-entity>
        <a-entity id="right-hand"
                  brush
                  paint-controls="hand: right"
                  blink-controls="cameraRig: #cameraRig; startEvents: aim; endEvents: teleport; hitCylinderColor: #ff3468; curveHitColor: #ff3468; curveMissColor: #333333; curveLineWidth: 0.01; hitEntity: #hitEntityRight"

    <a href="https://aframe.io/a-painter/"><div id="apainter-logo" class="hidden"></div><div id="apainter-author" style="display:none" class="hidden">Michaelqiu</div></a>
    <div id="apainter-ui">
      <div class="progress hide">
        Saving...
        <div class="bar"></div>
      </div>
      <div class="share hide">
        <div class="help">
          <h1>画作已保存! Saved!</h1>
          <p>您的绘画 URL。<br>Share or continue later。</p>
        </div>
        <div class="form">
          <input id="apainter-share-url" type="text" value="" readonly/>
          <div id="copy-toclipboard" data-clipboard-target="#apainter-share-url" class="button copy">Copy URL COPY</div>
        </div>
      </div>
    </div>
